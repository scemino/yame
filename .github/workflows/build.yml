name: build

on: [push, pull_request]

jobs:
    windows:
        runs-on: windows-latest
        steps:
        - uses: actions/checkout@main
        - uses: denoland/setup-deno@v2
        - name: win-msvc-debug
          run: |
            ./fibs config win-msvc-debug
            ./fibs build
            ./fibs run mo5
        - name: win-msvc-release
          run: |
            ./fibs config win-msvc-release
            ./fibs build
        - name: Upload Windows package to release
          uses: svenstaro/upload-release-action@v2
          if: startsWith(github.ref, 'refs/tags/v')
          with:
            repo_token: ${{ secrets.GHACTION_PUSH }}
            file: ../fips-deploy/yame/win-msvc-release/*
            tag: ${{ github.ref }}
            overwrite: true
            file_glob: true
    mac:
        runs-on: macos-latest
        steps:
        - uses: actions/checkout@main
        - uses: ashutoshvarma/setup-ninja@master
        - uses: denoland/setup-deno@v2
        - name: macos-ninja-debug
          run: |
            ./fibs config macos-ninja-debug
            ./fibs build
            ./fibs run mo5
        - name: macos-ninja-release
          run: |
            ./fibs config macos-ninja-release
            ./fibs build
        - name: zip
          working-directory: ../fips-deploy/yame/osx-make-release
          run:  |
            zip -r mo5.zip mo5.app
            zip -r mo5-ui.zip mo5-ui.app
        - name: Upload mo5 macOS package to release
          uses: svenstaro/upload-release-action@v2
          if: startsWith(github.ref, 'refs/tags/v')
          with:
            repo_token: ${{ secrets.GHACTION_PUSH }}
            file: ../fips-deploy/yame/osx-make-release/mo5.zip
            asset_name: mo5-mac.zip
            tag: ${{ github.ref }}
            overwrite: true
            file_glob: false
        - name: Upload mo5-ui macOS package to release
          uses: svenstaro/upload-release-action@v2
          if: startsWith(github.ref, 'refs/tags/v')
          with:
            repo_token: ${{ secrets.GHACTION_PUSH }}
            file: ../fips-deploy/yame/osx-make-release/mo5-ui.zip
            asset_name: mo5-ui-mac.zip
            tag: ${{ github.ref }}
            overwrite: true
            file_glob: false
    linux:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@main
        - uses: ashutoshvarma/setup-ninja@master
        - uses: denoland/setup-deno@v2
        - name: prepare
          run:  |
            sudo apt-get update
            sudo apt-get install libglu1-mesa-dev mesa-common-dev xorg-dev libasound-dev
        - name: linux-make-debug
          run: |
            ./fibs config linux-ninja-debug
            ./fibs build
            ./fibs run mo5
        - name: linux-make-release
          run: |
            ./fibs config linux-ninja-release
            ./fibs build
        - name: Upload mo5 Ubuntu package to release
          uses: svenstaro/upload-release-action@v2
          if: startsWith(github.ref, 'refs/tags/v')
          with:
            repo_token: ${{ secrets.GHACTION_PUSH }}
            file: ../fips-deploy/yame/linux-make-release/mo5
            asset_name: mo5-linux
            tag: ${{ github.ref }}
            overwrite: true
            file_glob: false
        - name: Upload mo5-ui Ubuntu package to release
          uses: svenstaro/upload-release-action@v2
          if: startsWith(github.ref, 'refs/tags/v')
          with:
            repo_token: ${{ secrets.GHACTION_PUSH }}
            file: ../fips-deploy/yame/linux-make-release/mo5-ui
            asset_name: mo5-ui-linux
            tag: ${{ github.ref }}
            overwrite: true
            file_glob: false
    emscripten:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@main
        - uses: ashutoshvarma/setup-ninja@master
        - uses: denoland/setup-deno@v2
        - name: install emsdk
          run: |
            ./fibs emsdk install
        - name: wasm-ninja-debug
          run: |
            ./fibs config emsc-ninja-debug
            ./fibs build
        - name: wasm-ninja-release
          run: |
            ./fibs config emsc-ninja-release
            ./fibs build
